<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock,Paper and Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <h1>ROCK, PAPER AND SCISSORS</h1>
    </div>
    <section id="playerdata">
      <div class="playercard">
        <p id="player1">Player 1</p>
        <p id="choice">Choose your move:</p>
        <div id="control">
          <button id="Rock">Rock</button>
          <button id="Paper">Paper</button>
          <button id="Scissors">Scissors</button>
        </div>
        <p id="Scoreplayer">Score:</p>
        <div class="message-area"></div>
      </div>
      <div id="VS"><p>VS</p></div>
      <div class="playercard">
        <p id="cpu">CPU</p>
        <div id="nerd"><img id="Image" src="/assets/nerd.png" alt="nerdy emoji" height="200px"></div>
        <p id="Scorecpu">Score:</p>
      </div>
    </section>
    <div><button id="Res">Reset</button></div>
    <audio id="cat-laugh" src="assets/cat-laugh.mp3"></audio>
    <audio id="why-cry" src="assets/why-cry.mp3"></audio>
    <audio id="tie" src="assets/vine-boom.mp3"></audio>
    <script src="pgm.js"></script>
  </body>
</html>
