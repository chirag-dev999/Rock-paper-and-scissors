<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock,Paper and Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <h1>ROCK, PAPER AND SCISSORS</h1>
    </div>
    <section id="playerdata">
      <div class="playercard">
        <p id="player1">Player 1</p>
        <p id="choice">Choose your move:</p>
        <div id="control">
          <button id="Rock">Rock</button>
          <button>Paper</button>
          <button>Scissors</button>
        </div>
        <p id="Scoreplayer">Score:</p>
      </div>
      <div id="VS"><p>VS</p></div>
      <div class="playercard">
        <p id="cpu">CPU</p>
        <p id="Scorecpu">Score:</p>
      </div>
    </section>
    <script src="pgm.js"></script>
  </body>
</html>
